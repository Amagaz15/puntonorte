<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto Norte | Parrilla & Rotisería</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --naranja:#E05C1A;
  --rojo:#8B1A1A;
  --crema:#F5ECD7;
  --oscuro:#1a1208;
}
body{font-family:'Lato',sans-serif;background:#111;color:#fff;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(180deg,#1a0e06 0%,#2a1508 100%);padding:1.2rem 1rem 1rem;text-align:center;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--naranja)}
.header-inner{position:relative;display:flex;align-items:center;justify-content:center}
.logo{width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--naranja)}
.header-text{margin-left:12px;text-align:left}
.header-text h1{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--crema);letter-spacing:1px;line-height:1.1}
.header-text p{font-size:11px;color:#aaa;margin-top:3px;letter-spacing:.5px}
.cart-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);background:var(--naranja);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:14px;cursor:pointer;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.5px}

/* PROMOS */
.promos-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;color:var(--naranja);text-align:center;padding:1rem 1rem 0.4rem;text-transform:uppercase}
.promos{display:flex;gap:10px;padding:0 1rem 1rem;overflow-x:auto;scrollbar-width:none}
.promos::-webkit-scrollbar{display:none}
.promo-card{min-width:150px;background:#1e1206;border:1px solid var(--naranja);border-radius:10px;padding:10px 12px;flex-shrink:0}
.promo-card .etiqueta{font-size:10px;color:var(--naranja);text-transform:uppercase;letter-spacing:1px;font-family:'Oswald',sans-serif}
.promo-card .pnombre{font-size:14px;font-weight:700;color:var(--crema);margin:3px 0 2px;font-family:'Oswald',sans-serif}
.promo-card .pprecio{font-size:16px;font-weight:700;color:var(--naranja)}

/* SECCIONES */
.seccion-header{background:#1a0e06;padding:10px 1rem;border-top:1px solid #333;border-bottom:1px solid #333;margin-top:6px}
.seccion-header h2{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--naranja);text-transform:uppercase;letter-spacing:1.5px}

/* ITEMS */
.item{display:flex;align-items:center;justify-content:space-between;padding:11px 1rem;border-bottom:1px solid #222;background:#0d0d0d}
.item:active{background:#1a1a1a}
.item-info .nombre{font-size:15px;font-weight:700;color:#f0e8d5;font-family:'Oswald',sans-serif;letter-spacing:.3px}
.item-info .desc{font-size:12px;color:#888;margin-top:2px}
.item-derecha{display:flex;align-items:center;gap:10px;flex-shrink:0}
.precio{font-size:15px;font-weight:700;color:#ccc;white-space:nowrap;font-family:'Oswald',sans-serif}
.agregar-btn{background:var(--naranja);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:'Oswald',sans-serif;flex-shrink:0}

/* CARRITO OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199}
.overlay.open{display:block}

/* PANEL CARRITO */
.cart-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid var(--naranja);padding:1rem;z-index:200;max-height:65vh;overflow-y:auto;border-radius:16px 16px 0 0}
.cart-panel.open{display:block}
.cart-cabecera{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cart-cabecera h3{font-family:'Oswald',sans-serif;font-size:18px;color:var(--crema);letter-spacing:.5px}
.cerrar-btn{background:none;border:none;font-size:24px;cursor:pointer;color:#888;line-height:1}
.cart-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #222;gap:8px}
.cart-item-nombre{flex:1;font-size:13px;color:#ddd;font-family:'Oswald',sans-serif;letter-spacing:.3px}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{background:#222;border:1px solid #444;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:14px;font-weight:700;min-width:18px;text-align:center;color:#fff}
.cart-item-precio{min-width:72px;text-align:right;font-size:13px;font-weight:700;color:var(--naranja);font-family:'Oswald',sans-serif}
.cart-total-row{display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-top:14px;padding-top:12px;border-top:1px solid #333;font-family:'Oswald',sans-serif;color:var(--crema)}
.cart-total-row span:last-child{color:var(--naranja)}
.finalizar-btn{width:100%;margin-top:12px;background:var(--naranja);color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase}
.finalizar-btn:active{opacity:.85}
.carrito-vacio{text-align:center;padding:1.5rem;color:#666;font-size:14px}

.direccion{text-align:center;font-size:11px;color:#555;padding:0.6rem;letter-spacing:.5px}
.footer{text-align:center;padding:1.5rem 1rem;color:#444;font-size:12px;font-family:'Oswald',sans-serif;letter-spacing:1px;border-top:1px solid #1a1a1a;margin-top:8px}
</style>
</head>

  </div>
  <div id="cart-items"><div class="carrito-vacio">El carrito está vacío</div></div>
  <div class="cart-total-row">
    <span>TOTAL</span>
    <span id="cart-total">$0</span>
  </div>
  <button class="finalizar-btn" onclick="finalizar()">Finalizar Pedido</button>
</div>

<script>
const menu = [
  {cat:"Especialidades a las Brasas", items:[
    {n:"Pollo a las Brasas + Fritas", d:"Especial de la casa", p:20000},
    {n:"Sandwich Vacío XL", d:"Comen 2 personas", p:26000},
  ]},
  {cat:"Sándwiches y Platos", items:[
    {n:"Mila a la Napolitana c/ Fritas", d:"Crujiente y abundante", p:14000},
    {n:"Sandwich Bondiola", d:"", p:13000},
    {n:"Sanguchazo de Mila Completo", d:"", p:14000},
    {n:"Cuarto Trasero de Pollo", d:"Con guarnición", p:10000},
    {n:"Hamburguesa Completa con Fritas", d:"", p:7000},
    {n:"Hamburguesa Bacon con Fritas", d:"", p:7000},
  ]},
  {cat:"Empanadas — c/u $2.000", items:[
    {n:"Empanada de Pollo", d:"Casera", p:2000},
    {n:"Empanada de Carne", d:"Bien rellena", p:2000},
    {n:"Jamón y Queso", d:"Clásica", p:2000},
    {n:"Carne Norteña Frita", d:"", p:2000},
    {n:"Catorcena de Empanadas", d:"14 empanadas surtidas", p:24000},
  ]},
  {cat:"Pizzas", items:[
    {n:"Pizza Mozzarella", d:"Clásica", p:10000},
    {n:"Pizza Especial", d:"La favorita", p:14000},
    {n:"Pizza Napolitana", d:"Tomate y ajo", p:16000},
    {n:"Pizza Cebolla", d:"Estilo parrilla", p:10000},
    {n:"Pizza Rúcula", d:"Premium", p:14000},
  ]},
  {cat:"Parrilla", items:[
    {n:"Choripán", d:"Con chimichurri", p:3500},
    {n:"Parrillada para 2 + Fritas", d:"Incluye fritas", p:48000},
    {n:"Asado Porción", d:"Cocción lenta", p:15000},
    {n:"Vacío Porción", d:"Al carbón", p:16000},
    {n:"Chinchulín Porción", d:"Bien crocante", p:8000},
    {n:"Riñón Porción", d:"Especialidad", p:8000},
    {n:"Morcilla", d:"Tradicional", p:8000},
    {n:"Papas Fritas Porción", d:"", p:6000},
  ]},
  {cat:"Otras Opciones", items:[
    {n:"Porción de Rabas", d:"", p:15000},
  ]},
];

let carrito = {};

function fmt(n){return "$" + n.toLocaleString("es-AR");}

function renderMenu(){
  const c = document.getElementById("menu-container");
  c.innerHTML = menu.map(sec => `
    <div class="seccion-header"><h2>${sec.cat}</h2></div>
    ${sec.items.map(it => `
      <div class="item">
        <div class="item-info">
          <div class="nombre">${it.n}</div>
          ${it.d ? `<div class="desc">${it.d}</div>` : ""}
        </div>
        <div class="item-derecha">
          <div class="precio">${fmt(it.p)}</div>
          <button class="agregar-btn" onclick="agregar(${JSON.stringify(it.n)},${it.p})">+</button>
        </div>
      </div>
    `).join("")}
  `).join("");
}

function agregar(nombre, precio){
  if(!carrito[nombre]) carrito[nombre]={precio, qty:0};
  carrito[nombre].qty++;
  actualizarCarrito();
}

function cambiarQty(nombre, d){
  if(!carrito[nombre]) return;
  carrito[nombre].qty += d;
  if(carrito[nombre].qty <= 0) delete carrito[nombre];
  actualizarCarrito();
}

function actualizarCarrito(){
  const total = Object.values(carrito).reduce((s,v)=>s+v.precio*v.qty,0);
  const count = Object.values(carrito).reduce((s,v)=>s+v.qty,0);
  document.getElementById("cart-count").textContent = count;
  document.getElementById("cart-total").textContent = fmt(total);
  const ci = document.getElementById("cart-items");
  const keys = Object.keys(carrito);
  if(keys.length === 0){
    ci.innerHTML = "<div class=\"carrito-vacio\">El carrito está vacío</div>";
    return;
  }
  ci.innerHTML = keys.map(nombre => {
    const v = carrito[nombre];
    const ns = nombre.replace(/\'/g,"\\'");
    return `<div class="cart-item">
      <div class="cart-item-nombre">${nombre}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="cambiarQty('${ns}',-1)">−</button>
        <span class="qty-num">${v.qty}</span>
        <button class="qty-btn" onclick="cambiarQty('${ns}',1)">+</button>
      </div>
      <div class="cart-item-precio">${fmt(v.precio*v.qty)}</div>
    </div>`;
  }).join("");
}

function toggleCart(){
  document.getElementById("cart-panel").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}

function finalizar(){
  const count = Object.values(carrito).reduce((s,v)=>s+v.qty,0);
  if(count===0){alert("Agregá algo al carrito primero");return;}
  const total = Object.values(carrito).reduce((s,v)=>s+v.precio*v.qty,0);
  const lineas = Object.entries(carrito).map(([n,v])=>`• ${v.qty}x ${n}: ${fmt(v.precio*v.qty)}`).join("\n");
  const mensaje = `Hola! Quiero hacer un pedido:\n\n${lineas}\n\nTOTAL: ${fmt(total)}`;
  const url = "https://wa.me/5492257619956?text=" + encodeURIComponent(mensaje);
  window.open(url, "_blank");
  carrito={};
  actualizarCarrito();
  toggleCart();
}

renderMenu();
</script>
